<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      width: 300px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #ffffff;
      color: #1a1a1a;
    }
    
    /* 头部 */
    .header {
      padding: 20px 20px 16px;
      background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
      color: #fff;
    }
    
    .title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 14px;
    }
    
    /* 状态卡片 */
    .status-card {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      background: rgba(255,255,255,0.15);
      border-radius: 8px;
      backdrop-filter: blur(10px);
    }
    
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #4ade80;
      box-shadow: 0 0 8px rgba(74, 222, 128, 0.6);
    }
    
    .status-dot.running {
      background: #fbbf24;
      box-shadow: 0 0 8px rgba(251, 191, 36, 0.6);
      animation: pulse 1.5s ease-in-out infinite;
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    
    .status-text {
      font-size: 13px;
      font-weight: 500;
    }
    
    .status-label {
      font-size: 11px;
      opacity: 0.7;
      margin-left: auto;
    }
    
    /* 内容区 */
    .content {
      padding: 16px 20px 20px;
    }
    
    /* 主按钮 */
    .btn-primary {
      width: 100%;
      padding: 14px 20px;
      background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    
    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(99, 102, 241, 0.4);
    }
    
    .btn-primary:active {
      transform: translateY(0);
    }
    
    .btn-icon {
      font-size: 16px;
    }
    
    /* 底部 */
    .footer {
      padding: 12px 20px;
      border-top: 1px solid #f0f0f0;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    
    .version {
      font-size: 11px;
      color: #999;
    }
    
    .company {
      font-size: 11px;
      color: #6366f1;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="title">浏览器助手</div>
    <div class="status-card">
      <div class="status-dot" id="statusDot"></div>
      <span class="status-text" id="statusText">空闲</span>
      <span class="status-label">当前状态</span>
    </div>
  </div>
  
  <div class="content">
    <button class="btn-primary" id="newChat">
      <span class="btn-icon">+</span>
      <span>开启新对话</span>
    </button>
  </div>
  
  <div class="footer">
    <span class="version" id="version"></span>
    <span class="company">极客增长</span>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
